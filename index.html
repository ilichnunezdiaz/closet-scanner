<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Closet Scanner</title>
  <link rel="manifest" href="data:application/manifest+json,{
    \"name\":\"Closet Scanner\",
    \"short_name\":\"Scanner\",
    \"start_url\":\".\",
    \"display\":\"standalone\",
    \"background_color\":\"#f0f0f0\",
    \"theme_color\":\"#4CAF50\",
    \"icons\":[{\"src\":\"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📦%3C/text%3E%3C/svg%3E\",\"sizes\":\"192x192\",\"type\":\"image/svg+xml\"}]
  }">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f8f8f8;
    }
    h2 {
      text-align: center;
      color: #333;
    }
    button {
      padding: 12px;
      margin: 10px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      background: #4CAF50;
      color: white;
    }
    button:disabled {
      background: #aaa;
    }
    #video {
      width: 100%;
      max-width: 600px;
      background: black;
      border-radius: 8px;
      display: none;
    }
    #status {
      text-align: center;
      font-size: 18px;
      margin: 20px;
      min-height: 50px;
    }
    .error {
      color: red;
    }
    #name_input {
      padding: 10px;
      font-size: 16px;
      width: 70%;
      margin: 10px;
      display: none;
    }
    #save_btn {
      display: none;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: white;
    }
    th, td {
      padding: 12px;
      border-bottom: 1px solid #ddd;
    }
    th {
      background: #4CAF50;
      color: white;
    }
    .small {
      padding: 6px 12px;
      font-size: 14px;
      margin: 0 4px;
    }
    .qty-controls {
      white-space: nowrap;
    }
    .inventory-footer {
      text-align: center;
      margin: 20px;
    }
    
    /* Highlight animation (saved for future fix) */
    @keyframes highlight-pulse {
      0% { background-color: #FFF9C4; }
      50% { background-color: #FFEB3B; }
      100% { background-color: #FFF9C4; }
    }
    
    .highlight-scanned {
      animation: highlight-pulse 1s ease-in-out 3;
      transition: background-color 0.5s ease-out;
    }
  </style>
</head>
<body>
  <h2>Supply Closet Scanner</h2>

  <div style="text-align:center;">
    <button id="startBtn">Start Scanning</button>
    <button id="stopBtn" style="display:none; background:#f44336;">Stop</button>
    <button id="scanAnotherBtn" style="display:none; background:#2196F3;">Scan Another</button>
    <button id="inventoryBtn">Show Inventory</button>
    <button id="recipesBtn">Recipes</button>
  </div>

  <div id="status">Tap to start…</div>

  <video id="video" autoplay playsinline muted></video>
  <input id="name_input" placeholder="Item name">
  <button id="save_btn">Save</button>

  <table id="inventory" style="display:none;">
    <thead>
      <tr>
        <th>Item Name</th>
        <th style="text-align:center;">Quantity</th>
        <th style="text-align:center;">Adjust</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <div id="inventoryFooter" class="inventory-footer" style="display:none;">
    <p id="inventoryCount" style="margin:10px 0;font-weight:bold;"></p>
    <button id="saveInventoryBtn" style="background:#1976d2;">Save Changes</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.21.0/umd/index.min.js"></script>

  <script>
    const API = "https://script.google.com/macros/s/AKfycbz9K2Rf3D7n1PcxLvVpvTUXrmdnQ9MF77AcdSUzyCbS9S384XW8hKq_q9glZaTLTlRS/exec";

    let currentBarcode = null;
    let stream = null;
    let inventoryData = [];
    let inventoryVisible = false;
    let scanningActive = false; // NEW: Track if actively waiting for barcode
    const codeReader = new ZXing.BrowserMultiFormatReader();
    const videoEl = document.getElementById('video');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const scanAnotherBtn = document.getElementById('scanAnotherBtn'); // NEW
    const inventoryBtn = document.getElementById('inventoryBtn');
    const recipesBtn = document.getElementById('recipesBtn');
    const status = document.getElementById('status');
    const inventoryTable = document.getElementById('inventory').querySelector('tbody');
    const inventoryFooter = document.getElementById('inventoryFooter');
    const inventoryCount = document.getElementById('inventoryCount');
    const saveInventoryBtn = document.getElementById('saveInventoryBtn');
    const nameInput = document.getElementById('name_input');
    const saveBtn = document.getElementById('save_btn');
    // ==================== SAVE NEW ITEM NAME ====================
    saveBtn.onclick = async () => {
      const name = nameInput.value.trim();
      
      if (!name || !currentBarcode) {
        status.innerHTML = '<span class="error">Enter a name</span>';
        return;
      }

      try {
        const res = await fetch(`${API}?code=${encodeURIComponent(currentBarcode)}&name=${encodeURIComponent(name)}`, {
          method: 'GET',
          mode: 'cors',
          cache: 'no-cache'
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        
        const d = await res.json();
        
        status.textContent = `${d.action.toUpperCase()}: ${d.name || ''} qty: ${d.qty}`;
        
        nameInput.style.display = "none";
        saveBtn.style.display = "none";
        nameInput.value = "";
        
        // NEW: Fast update - use response data instead of full refresh
        if (inventoryVisible && d.action === "added") {
          updateInventoryRow(currentBarcode, d.name, d.qty);
        }
        
        // Show "Scan Another" button
        scanAnotherBtn.style.display = "inline-block";
        
      } catch (err) {
        status.innerHTML = `<span class="error">Add failed:<br>${err.message}</span>`;
      }
    };

    // ==================== LOAD INVENTORY ====================
    inventoryBtn.onclick = async () => {
      inventoryBtn.disabled = true;
      inventoryBtn.textContent = "Loading…";
      status.textContent = "Fetching…";
      inventoryTable.innerHTML = "";
      document.getElementById('inventory').style.display = "none";
      inventoryFooter.style.display = "none";

      try {
        const res = await fetch(`${API}?action=get_inventory&ts=${Date.now()}`, {
          method: 'GET',
          mode: 'cors',
          cache: 'no-cache'
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        
        const data = await res.json();

        if (data.action === "empty") {
          inventoryTable.innerHTML = "<tr><td colspan='3'>No items in stock</td></tr>";
          inventoryData = [];
        } 
        else if (data.action === "inventory" && Array.isArray(data.items)) {
          inventoryData = data.items.map(i => ({ ...i }));
          renderInventory();
        } 
        else {
          throw new Error("Invalid response");
        }

        document.getElementById('inventory').style.display = "table";
        inventoryFooter.style.display = "block";
        inventoryVisible = true;
        updateCount();
      } catch (err) {
        status.innerHTML = `<span class="error">Failed:<br>${err.message}</span>`;
      } finally {
        inventoryBtn.disabled = false;
        inventoryBtn.textContent = "Show Inventory";
      }
    };

    // ==================== NEW: FAST INVENTORY UPDATE (OPTION B) ====================
    function updateInventoryRow(barcode, name, newQty) {
      // Find item in local inventory data
      const item = inventoryData.find(i => 
        String(i.Barcode).trim() === String(barcode).trim()
      );
      
      if (item) {
        // Update existing item
        item.Quantity = newQty;
      } else {
        // Add new item to inventory
        inventoryData.push({
          Barcode: barcode,
          Name: name,
          Quantity: newQty
        });
      }
      
      // Re-render table with updated data
      renderInventory();
      updateCount();
    }

    // ==================== RENDER INVENTORY TABLE ====================
    function renderInventory(highlightBarcode = null) {
      inventoryTable.innerHTML = "";
      
      inventoryData.forEach((item, idx) => {
        const row = document.createElement('tr');
        
        // Highlight support (saved for future fix - Issue #1)
        const isHighlighted = highlightBarcode && 
          String(item.Barcode).trim() === String(highlightBarcode).trim();
        if (isHighlighted) {
          row.className = 'highlight-scanned';
          setTimeout(() => { row.className = ''; }, 3500);
        }
        
        row.innerHTML = `
          <td>${item.Name || '—'}</td>
          <td style="text-align:center;font-weight:bold;">${item.Quantity || 0}</td>
          <td class="qty-controls">
            <button class="small" onclick="adjustQty(${idx}, -1)">–</button>
            <button class="small" onclick="adjustQty(${idx}, 1)">+</button>
          </td>
        `;
        inventoryTable.appendChild(row);
        
        if (isHighlighted) {
          setTimeout(() => {
            row.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }, 100);
        }
      });
    }

    // ==================== ADJUST QUANTITY ====================
    window.adjustQty = (idx, delta) => {
      const item = inventoryData[idx];
      const currentQty = parseInt(item.Quantity) || 0;
      const newQty = currentQty + delta;

      if (newQty >= 0) {
        item.Quantity = newQty;
        renderInventory();
        updateCount();
      }
    };

    // ==================== UPDATE ITEM COUNT ====================
    function updateCount() {
      const c = inventoryData.length;
      inventoryCount.textContent = `Inventory: ${c} item${c === 1 ? '' : 's'}`;
    }

    // ==================== SAVE INVENTORY CHANGES ====================
    saveInventoryBtn.onclick = async () => {
      saveInventoryBtn.disabled = true;
      saveInventoryBtn.textContent = "Saving…";
      try {
        const updates = inventoryData.map(i => ({
          barcode: i.Barcode,
          qty: parseInt(i.Quantity) || 0
        }));

        const res = await fetch(API, {
          method: 'POST',
          mode: 'cors',
          body: JSON.stringify({
            action: 'update_quantities',
            data: updates
          }),
          headers: {
            'Content-Type': 'text/plain'
          }
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        
        const result = await res.json();

        if (result.success) {
          status.textContent = "Inventory saved!";
          setTimeout(() => status.textContent = "Tap to start…", 2000);
        } else {
          throw new Error(result.error || "Save failed");
        }

      } catch (err) {
        status.innerHTML = `<span class="error">Save failed:<br>${err.message}</span>`;
      } finally {
        saveInventoryBtn.disabled = false;
        saveInventoryBtn.textContent = "Save Changes";
      }
    };

    // ==================== START CAMERA SCANNING ====================
    startBtn.onclick = async () => {
      startBtn.disabled = true;
      startBtn.style.display = "none";
      stopBtn.style.display = "inline-block";
      scanAnotherBtn.style.display = "none"; // Hide initially
      
      inventoryBtn.style.display = "none";
      recipesBtn.style.display = "none";
      
      status.textContent = "Requesting camera…";

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment" },
          audio: false
        });

        videoEl.srcObject = stream;
        videoEl.style.display = "block";
        await videoEl.play();
        
        scanningActive = true;
        status.textContent = "Scanning…";

        codeReader.decodeFromVideoDevice(null, videoEl, result => {
          if (result && scanningActive) {
            currentBarcode = result.getText();
            status.textContent = `Found: ${currentBarcode}`;
            codeReader.reset();
            scanningActive = false; // Pause scanning until "Scan Another" clicked

            fetch(`${API}?code=${currentBarcode}`, { method: 'GET' })
              .then(r => r.json())
              .then(d => {
                if (d.action === "ask_name") {
                  nameInput.style.display = "block";
                  saveBtn.style.display = "block";
                  scanAnotherBtn.style.display = "none"; // Hide until name saved
                } else {
                  status.textContent = `${d.action.toUpperCase()}: ${d.name || ''} qty: ${d.qty}`;
                  
                  // NEW: Fast update using response data (OPTION B)
                  if (inventoryVisible) {
                    updateInventoryRow(currentBarcode, d.name, d.qty);
                  }
                  
                  // Show "Scan Another" button
                  scanAnotherBtn.style.display = "inline-block";
                }
              })
              .catch(err => {
                status.innerHTML = `<span class="error">Scan failed:<br>${err.message}</span>`;
                scanAnotherBtn.style.display = "inline-block"; // Allow retry
              });
          }
        });

      } catch (err) {
        status.innerHTML = `<span class="error">Camera error:<br>${err.message}</span>`;
        resetToMainScreen();
      }
    };

    // ==================== NEW: SCAN ANOTHER BUTTON ====================
    scanAnotherBtn.onclick = () => {
      currentBarcode = null;
      scanningActive = true; // Resume scanning
      status.textContent = "Scanning…";
      scanAnotherBtn.style.display = "none";
      
      // Resume barcode detection (camera already running)
      codeReader.decodeFromVideoDevice(null, videoEl, result => {
        if (result && scanningActive) {
          currentBarcode = result.getText();
          status.textContent = `Found: ${currentBarcode}`;
          codeReader.reset();
          scanningActive = false;

          fetch(`${API}?code=${currentBarcode}`, { method: 'GET' })
            .then(r => r.json())
            .then(d => {
              if (d.action === "ask_name") {
                nameInput.style.display = "block";
                saveBtn.style.display = "block";
                scanAnotherBtn.style.display = "none";
              } else {
                status.textContent = `${d.action.toUpperCase()}: ${d.name || ''} qty: ${d.qty}`;
                
                if (inventoryVisible) {
                  updateInventoryRow(currentBarcode, d.name, d.qty);
                }
                
                scanAnotherBtn.style.display = "inline-block";
              }
            })
            .catch(err => {
              status.innerHTML = `<span class="error">Scan failed:<br>${err.message}</span>`;
              scanAnotherBtn.style.display = "inline-block";
            });
        }
      });
    };

    // ==================== STOP SCANNING ====================
    stopBtn.onclick = resetToMainScreen;

    // ==================== RECIPES BUTTON (PLACEHOLDER) ====================
    recipesBtn.onclick = () => {
      status.textContent = "Recipes coming soon...";
    };

    // ==================== RESET TO MAIN SCREEN ====================
    function resetToMainScreen() {
      if (stream) stream.getTracks().forEach(t => t.stop());
      videoEl.srcObject = null;
      videoEl.style.display = "none";
      codeReader.reset();
      scanningActive = false;

      startBtn.disabled = false;
      startBtn.style.display = "inline-block";
      stopBtn.style.display = "none";
      scanAnotherBtn.style.display = "none";
      
      inventoryBtn.style.display = "inline-block";
      recipesBtn.style.display = "inline-block";
      nameInput.style.display = "none";
      saveBtn.style.display = "none";
      nameInput.value = "";

      status.textContent = "Tap to start…";
      
      if (!document.getElementById('inventory').style.display || 
          document.getElementById('inventory').style.display === 'none') {
        inventoryVisible = false;
      }
    }
  </script>
</body>
</html>
